<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset = "UFT-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            Weather Site
        </title>
        <link rel = "stylesheet" href = "style.css">
    </head>
    <body>
        <div class = "container">
            <div class = "weather-card">
                <h1>Weather App</h1>
                <div class = "search">
                    <input type = "text" id = "cityInput" placeholder="Enter city name">
                    <button id = "searchBtn">
                        Search
                    </button>
                </div>
                <div id = "weatherData" class = "weather-data">
                    <h2 id = "cityName">City</h2>
                    <h3 id = "temperature">--°C</h3>
                    <p id = "description">Weather Description</p>
                    <div class = "details">
                    <div class = "detail-box">
                        <span>Humidity</span>
                        <h4 id = "humidity">--%</h4>
                    </div>
                    <div class = "detail-box">
                        <span>Wind</span>
                        <h4 id = "wind">--km/h</h4>
                    </div>
                    </div>
                </div>
            </div>
        </div>
        <script src = "script.js"></script>
    </body>
</html>
